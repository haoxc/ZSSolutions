<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#184f9e"/>
      <stop offset="48%" stop-color="#1f5fae"/>
      <stop offset="100%" stop-color="#2ca9c9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#9fb6c8" flood-opacity="0.24"/>
    </filter>
    <style>
      .bg { fill: #f3f7fb; }
      .panel { fill: #ffffff; stroke: #cfd9e6; stroke-width: 2; }
      .frame { fill: #fbfdff; stroke: #d7e1eb; stroke-width: 2; }
      .title { font: 700 28px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #ffffff; }
      .zoneTitle { font: 700 28px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
      .zoneSub { font: 500 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #374151; }
      .boxTitle { font: 600 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #1f2937; }
      .boxBody { font: 500 16px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #334155; }
      .flowLabel { font: 600 16px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #475569; }
      .leftZone { fill: #fdf5ea; stroke: #f06b17; stroke-width: 3; }
      .middleZone { fill: #f8fafc; stroke: #64748b; stroke-width: 3; }
      .rightZone { fill: #dfeafe; stroke: #2563eb; stroke-width: 3; }
      .leftBox { fill: #fffdf7; stroke: #ff6a00; stroke-width: 2.5; }
      .middleBox { fill: #ffffff; stroke: #64748b; stroke-width: 2.5; }
      .rightBox { fill: #f8fbff; stroke: #2563eb; stroke-width: 2.5; }
      .flowBar { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="980"/>

  <rect class="panel" x="72" y="52" width="1656" height="876" rx="38" filter="url(#shadow)"/>
  <rect x="112" y="72" width="1576" height="74" fill="url(#topBar)"/>
  <text class="title" x="154" y="118">平台数据接口调用体系图</text>

  <rect class="frame" x="112" y="146" width="1576" height="734"/>

  <rect class="leftZone" x="146" y="190" width="438" height="560" rx="16" filter="url(#shadow)"/>
  <text class="zoneTitle" x="365" y="246" text-anchor="middle" fill="#7c2d12">业务平台</text>
  <text class="zoneSub" x="365" y="282" text-anchor="middle">第三方业务系统</text>

  <rect class="leftBox" x="196" y="334" width="338" height="88" rx="12"/>
  <text class="boxTitle" x="365" y="386" text-anchor="middle">生产监控</text>

  <rect class="leftBox" x="196" y="474" width="338" height="88" rx="12"/>
  <text class="boxTitle" x="365" y="526" text-anchor="middle">安全监管</text>

  <rect class="leftBox" x="196" y="614" width="338" height="88" rx="12"/>
  <text class="boxTitle" x="365" y="666" text-anchor="middle">智能巡视</text>

  <rect class="middleZone" x="680" y="190" width="438" height="560" rx="16" filter="url(#shadow)"/>
  <text class="zoneTitle" x="899" y="246" text-anchor="middle" fill="#1f2937">数据接入服务</text>
  <text class="zoneSub" x="899" y="282" text-anchor="middle">统一接入 / 统一执行 / 统一输出</text>

  <rect class="middleBox" x="732" y="316" width="334" height="160" rx="12"/>
  <text class="boxTitle" x="899" y="370" text-anchor="middle">统一接入与鉴权</text>
  <text class="boxBody" x="899" y="406" text-anchor="middle">SSO Token / Kafka / RESTful</text>
  <text class="boxBody" x="899" y="438" text-anchor="middle">统一接入入口、统一鉴权校验</text>

  <rect class="middleBox" x="732" y="520" width="334" height="168" rx="12"/>
  <text class="boxTitle" x="899" y="576" text-anchor="middle">数据执行与结果输出</text>
  <text class="boxBody" x="899" y="612" text-anchor="middle">运行消费 / 状态异常 / 标准结果输出</text>
  <text class="boxBody" x="899" y="644" text-anchor="middle">孪生体数据接入服务 / RESTful</text>

  <rect class="rightZone" x="1214" y="190" width="438" height="560" rx="16" filter="url(#shadow)"/>
  <text class="zoneTitle" x="1433" y="246" text-anchor="middle" fill="#1e3a8a">数字孪生平台</text>
  <text class="zoneSub" x="1433" y="282" text-anchor="middle">数字孪生应用</text>

  <rect class="rightBox" x="1264" y="380" width="338" height="98" rx="12"/>
  <text class="boxTitle" x="1433" y="438" text-anchor="middle">三维可视化</text>

  <rect class="rightBox" x="1264" y="548" width="338" height="98" rx="12"/>
  <text class="boxTitle" x="1433" y="606" text-anchor="middle">大屏展示</text>

  <rect class="flowBar" x="534" y="477" width="198" height="42" rx="8"/>
  <text class="flowLabel" x="633" y="504" text-anchor="middle">SSO / Kafka / RESTful</text>

  <rect class="flowBar" x="1066" y="477" width="198" height="42" rx="8"/>
  <text class="flowLabel" x="1165" y="504" text-anchor="middle">RESTful</text>
</svg>
